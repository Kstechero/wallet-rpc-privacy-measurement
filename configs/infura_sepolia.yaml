# M2 New Config: Infura Sepolia RPC (Standardized YAML format - M1 compatible)
rpc_provider: "Infura"
network: "Sepolia"
rpc_url: "https://sepolia.infura.io/v3/[YOUR_API_KEY]"
request_scenarios:  # M2 expanded scenarios (nonce/eth_call)
  - scenario: "nonce"
    method: "eth_getTransactionCount"
    params: ["0xYourWalletAddress", "latest"]
    request_count: 100
    interval_seconds: 1
  - scenario: "eth_call"
    method: "eth_call"
    params: [{"to": "0xContractAddress", "data": "0xData"}, "latest"]
    request_count: 100
    interval_seconds: 1
log_path: "logs/m2_experiments/infura_sepolia.log"  # M2 log path (M1 spec)
timeout_ms: 5000